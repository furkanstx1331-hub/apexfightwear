<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Apex Fight Wear</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.product {
    background: #1c1c1c;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #ff3c3c;
}

/* MODAL (ürün detay) */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #222;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

button {
    background: #ff3c3c;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<header>🔥 APEX FIGHT WEAR</header>

<div class="products" id="productList"></div>

<!-- ÜRÜN DETAY -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <p class="price" id="price"></p>
    <button id="buyBtn">Satın Al</button>
    <button onclick="closeModal()">Kapat</button>
  </div>
</div>

<script>

// 🔥 ÜRÜNLERİNİZİ BURAYA EKLEYİN
let products = [
{
    name: "Charles Oliveira Do Bronx unisex soft tşört",
    price: "1199₺",
    desc: "Sert stil, dövüş ruhu 🔥",
    img: "https://images.printify.com/mockup/69f346a8edec310f670b968f/38191/97992/19dde61c290.jpg?s=608",
    link: "https://printify.com/app/store/products/1"
},
{
    name: "Street Fighter Tee",
    price: "280₺",
    desc: "Sokak tarzı güçlü tasarım",
    img: "https://via.placeholder.com/200",
    link: "PRINTIFY_LINK_2"
},
{
    name: "Minimal Fight Tee",
    price: "260₺",
    desc: "Minimal ama güçlü",
    img: "https://via.placeholder.com/200",
    link: "PRINTIFY_LINK_3"
}
];

// Ürünleri ekrana bas
let list = document.getElementById("productList");

products.forEach(p => {
    let div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
        <img src="${p.img}">
        <p>${p.name}</p>
        <p class="price">${p.price}</p>
    `;
    div.onclick = () => openModal(p);
    list.appendChild(div);
});

// Modal aç
function openModal(p) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("title").innerText = p.name;
    document.getElementById("desc").innerText = p.desc;
    document.getElementById("price").innerText = p.price;

    document.getElementById("buyBtn").onclick = () => {
        window.location.href = p.link;
    };
}

// Modal kapat
function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
