<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Apex Fight Wear</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    background: black;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.product {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #ff2e2e;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ff0000;
}

#cart {
    margin: 40px auto;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}
</style>

</head>
<body>

<header>
🔥 APEX FIGHT WEAR
</header>

<div class="products">

<div class="product">
    <img src="https://via.placeholder.com/220">
    <h3>Warrior Tee</h3>
    <p>300₺</p>
    <button onclick="addToCart('Warrior Tee',300)">Sepete Ekle</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/220">
    <h3>Street Fighter Tee</h3>
    <p>280₺</p>
    <button onclick="addToCart('Street Fighter Tee',280)">Sepete Ekle</button>
</div>

</div>

<div id="cart">
<h2>🛒 Sepet</h2>
<ul id="cartList"></ul>
<h3 id="total">Toplam: 0₺</h3>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price) {
    cart.push({name, price});
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function renderCart() {
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.name + " - " + item.price + "₺";
        list.appendChild(li);
        total += item.price;
    });

    document.getElementById("total").textContent = "Toplam: " + total + "₺";
}

renderCart();
</script>

</body>
</html>
